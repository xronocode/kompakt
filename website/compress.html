<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
[hidden]{display:none!important}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;
  --border:#30363d;--border2:#3d444d;
  --text:#e6edf3;--muted:#7d8590;
  --cyan:#39d0d8;--cyan-dim:rgba(57,208,216,.10);
  --green:#3fb950;--yellow:#d29922;
  --radius:12px;
}
html{min-height:100%;display:flex}
body{
  flex:1;display:flex;flex-direction:column;
  background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  font-size:15px;line-height:1.5;
  -webkit-font-smoothing:antialiased;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}

/* NAV */
.nav{background:rgba(13,17,23,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 20px;position:sticky;top:0;z-index:10}
.nav-inner{max-width:600px;margin:0 auto;height:52px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:16px;color:var(--cyan);text-decoration:none}
.logo:hover{text-decoration:none}
.lang-select{background:var(--bg3);color:var(--muted);border:1px solid var(--border);border-radius:6px;padding:6px 8px;font-size:13px;cursor:pointer;min-height:44px}

/* APP */
.app{max-width:600px;width:100%;margin:0 auto;padding:24px 20px 40px;display:flex;flex-direction:column;gap:16px;flex:1}

/* DROP ZONE */
.drop-zone{
  border:2px dashed var(--border2);border-radius:var(--radius);
  padding:40px 20px 36px;text-align:center;cursor:pointer;
  transition:border-color .15s,background .15s;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  user-select:none;-webkit-user-select:none;
  min-height:160px;justify-content:center;
}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--cyan);background:var(--cyan-dim)}
.drop-zone.has-file{border-style:solid;border-color:var(--cyan);background:var(--cyan-dim)}
.drop-icon{font-size:36px;opacity:.7;margin-bottom:4px}
.drop-zone.has-file .drop-icon{opacity:1}
.drop-label{font-size:16px;font-weight:600}
.drop-hint{font-size:13px;color:var(--muted)}

/* QUALITY */
.section-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:-8px}
.quality-row{display:flex;gap:8px}
.quality-btn{
  flex:1;background:var(--bg2);border:1.5px solid var(--border);
  border-radius:var(--radius);color:var(--muted);padding:14px 8px;
  cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;
  transition:border-color .12s,color .12s,background .12s;
  font-family:inherit;min-height:44px;
}
.quality-btn:hover{border-color:var(--border2);color:var(--text)}
.quality-btn.active{border-color:var(--cyan);background:var(--cyan-dim);color:var(--cyan)}
.q-key{font-size:14px;font-weight:700}
.q-desc{font-size:11px;color:var(--muted)}
.quality-btn.active .q-desc{color:var(--cyan);opacity:.75}

/* COMPRESS BUTTON */
.compress-btn{
  background:var(--cyan);color:#000;border:none;border-radius:var(--radius);
  padding:16px;font-family:inherit;font-size:16px;font-weight:700;
  cursor:pointer;transition:opacity .12s,filter .12s;width:100%;
  min-height:52px;
}
.compress-btn:disabled{opacity:.25;cursor:default}
.compress-btn:not(:disabled):hover{filter:brightness(1.1)}
.compress-btn:not(:disabled):active{filter:brightness(.9)}

/* PROGRESS */
.progress-wrap{display:flex;flex-direction:column;gap:8px}
.progress-bar-track{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.progress-bar-fill{height:100%;width:0%;background:var(--cyan);border-radius:2px;transition:width .25s ease}
.progress-text{font-size:13px;color:var(--muted);text-align:center}

/* RESULT */
.result{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.result-stats{display:flex;align-items:center;padding:16px;gap:6px}
.stat{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1}
.stat-ratio{flex:1.2}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.stat-value{font-size:18px;font-weight:700}
.stat-arrow{color:var(--muted);font-size:16px;padding:0 4px;margin-top:14px}
.ratio.good{color:var(--green)}
.ratio.bad{color:var(--yellow)}
.result-actions{display:flex;border-top:1px solid var(--border)}
.save-btn{
  flex:1;background:var(--bg3);border:none;
  color:var(--text);padding:14px;font-family:inherit;font-size:15px;font-weight:600;
  cursor:pointer;transition:background .12s,color .12s;text-align:center;
  min-height:48px;
}
.save-btn:hover{background:var(--cyan-dim);color:var(--cyan)}
.share-btn{
  background:var(--bg3);border:none;border-left:1px solid var(--border);
  color:var(--muted);padding:14px 18px;cursor:pointer;
  transition:background .12s,color .12s;display:flex;align-items:center;
  min-height:48px;min-width:52px;justify-content:center;
}
.share-btn:hover{background:var(--cyan-dim);color:var(--cyan)}
.share-btn svg{width:18px;height:18px;fill:currentColor}

/* UPSELL */
.upsell{
  border:1px solid rgba(210,153,34,.4);border-radius:var(--radius);
  background:rgba(210,153,34,.06);padding:14px 16px;
  display:flex;flex-direction:column;gap:8px;
}
.upsell-row{display:flex;align-items:flex-start;gap:8px}
.upsell-spark{font-size:16px;flex-shrink:0;margin-top:1px}
.upsell-text{font-size:13px;color:var(--muted);line-height:1.6}
.upsell-text strong{color:var(--text)}
.upsell-link{font-size:13px;font-weight:700;color:var(--cyan);text-decoration:none}
.upsell-link:hover{text-decoration:underline}

/* PRIVACY NOTE */
.privacy-note{text-align:center;font-size:12px;color:var(--muted);padding:8px 0;line-height:1.6}
.privacy-note strong{color:var(--text);font-weight:600}

/* DONATE */
.donate-btn{
  display:inline-flex;align-items:center;gap:6px;padding:7px 16px;
  border-radius:20px;font-size:12px;font-weight:600;color:#fff;text-decoration:none;
  background:linear-gradient(135deg,#ff5e5b,#ff9966,#ffcc33,#ff5e5b);background-size:300% 300%;
  animation:donateGlow 3s ease infinite;transition:transform .15s,box-shadow .15s;
  position:relative;overflow:hidden;
}
.donate-btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(255,94,91,.5);text-decoration:none}
.donate-btn::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.25) 50%,transparent 100%);transform:translateX(-100%);animation:donateShine 3s ease-in-out infinite}
.donate-btn img{width:18px;height:18px}
@keyframes donateGlow{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
@keyframes donateShine{0%{transform:translateX(-100%)}60%,100%{transform:translateX(100%)}}

/* FOOTER */
.footer{border-top:1px solid var(--border);padding:20px;text-align:center;margin-top:auto;display:flex;flex-direction:column;align-items:center;gap:16px}
.footer-link{color:var(--muted);font-size:13px;text-decoration:none;font-weight:600}
.footer-link:hover{color:var(--cyan);text-decoration:underline}

/* NEW FILE BUTTON */
.new-file-btn{
  background:var(--bg3);color:var(--muted);border:1px solid var(--border);
  border-radius:var(--radius);padding:12px;font-family:inherit;font-size:14px;
  font-weight:600;cursor:pointer;width:100%;text-align:center;
  transition:border-color .12s,color .12s;min-height:44px;
}
.new-file-btn:hover{border-color:var(--cyan);color:var(--cyan)}
</style>
</head>

      </button>
    </div>

  <!-- Donate (small, between result and upsell) -->
  <div id="donate-block" hidden style="text-align:center">

function detectLang() {
  const saved = localStorage.getItem('kompakt-lang');
  if (saved && i18n[saved]) return saved;
  const nav = (navigator.language || '').toLowerCase();
  if (nav.startsWith('zh')) return 'zh';
  if (nav.startsWith('pt')) return 'pt';
  if (nav.startsWith('ja')) return 'ja';
  if (nav.startsWith('de')) return 'de';
  if (nav.startsWith('fr')) return 'fr';
  if (nav.startsWith('es')) return 'es';
  if (nav.startsWith('ru')) return 'ru';
  return 'en';
}

let currentLang = 'en';

function t(key, ...subs) {
  const msg = (i18n[currentLang] || i18n.en)[key] || (i18n.en)[key] || key;
  return subs.reduce((s, v, i) => s.replace('$' + (i + 1), v), msg);
}

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const msg = t(el.dataset.i18n);
    if (msg && msg !== el.dataset.i18n) el.textContent = msg;
  });
  document.querySelectorAll('[data-i18n-html]').forEach(el => {
    const msg = t(el.dataset.i18nHtml || el.dataset['i18nHtml']);
    if (msg) el.innerHTML = msg;
  });
}

function setLang(lang) {
  currentLang = lang;
  applyI18n();
  document.documentElement.lang = lang === 'zh' ? 'zh-CN' : lang === 'pt' ? 'pt-BR' : lang;
  localStorage.setItem('kompakt-lang', lang);
}

// ── Config ────────────────────────────────────────────────────────────────────

const QUALITY = {
  low:    { dpi: 72,  jpeg: 0.50 },
  medium: { dpi: 150, jpeg: 0.72 },
  high:   { dpi: 300, jpeg: 0.88 },
};

const MAX_FILE_BYTES = 1_073_741_824; // 1 GB
const BATCH_SIZE = 5; // pages per batch — limits peak RAM usage

// ── State ─────────────────────────────────────────────────────────────────────

let currentFile     = null;
let selectedQuality = 'medium';
let isCompressing   = false;
let lastBlobUrl     = null;

// ── DOM refs ──────────────────────────────────────────────────────────────────

const dropZone     = document.getElementById('drop-zone');
const fileInput    = document.getElementById('file-input');
const qualityBtns  = document.querySelectorAll('.quality-btn');
const compressBtn  = document.getElementById('compress-btn');
const progressWrap = document.getElementById('progress');
const progressBar  = document.getElementById('progress-bar');
const progressText = document.getElementById('progress-text');
const resultEl     = document.getElementById('result');
const upsellEl     = document.getElementById('upsell');
const newFileBtn   = document.getElementById('new-file-btn');

// ── Init ──────────────────────────────────────────────────────────────────────

const lang = detectLang();
document.getElementById('langSelect').value = lang;
setLang(lang);
document.getElementById('langSelect').addEventListener('change', e => setLang(e.target.value));

// ── Drop zone ─────────────────────────────────────────────────────────────────

dropZone.addEventListener('dragover', e => {
  e.preventDefault();
  dropZone.classList.add('drag-over');
});
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  if (isCompressing) return;
  const file = e.dataTransfer.files[0];
  if (file?.type === 'application/pdf') setFile(file);
});
dropZone.addEventListener('click', () => { if (!isCompressing) fileInput.click(); });
fileInput.addEventListener('change', () => {
  if (fileInput.files[0] && !isCompressing) setFile(fileInput.files[0]);
});

// ── Quality ───────────────────────────────────────────────────────────────────

qualityBtns.forEach(btn => btn.addEventListener('click', () => {
  if (isCompressing) return;
  qualityBtns.forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedQuality = btn.dataset.quality;
}));

// ── Compress ──────────────────────────────────────────────────────────────────

compressBtn.addEventListener('click', compress);

// ── New file ──────────────────────────────────────────────────────────────────

newFileBtn.addEventListener('click', () => {
  currentFile = null;
  fileInput.value = '';
  dropZone.querySelector('.drop-label').textContent = t('dropTitle');
  dropZone.querySelector('.drop-hint').textContent = t('dropHint');
  dropZone.classList.remove('has-file');
  compressBtn.disabled = true;
  resultEl.hidden = true;
  upsellEl.hidden = true;
  newFileBtn.hidden = true;
  document.getElementById('donate-block').hidden = true;
  document.getElementById('share-btn').hidden = true;
  if (lastBlobUrl) { URL.revokeObjectURL(lastBlobUrl); lastBlobUrl = null; }
});

// ── Helpers ───────────────────────────────────────────────────────────────────

function setFile(file) {
  if (file.size > MAX_FILE_BYTES) {
    alert(t('errFileTooLarge'));
    return;
  }
  currentFile = file;
  const name = file.name.length > 34 ? file.name.slice(0, 31) + '…' : file.name;
  dropZone.querySelector('.drop-label').textContent = name;
  dropZone.querySelector('.drop-hint').textContent  = fmtBytes(file.size);
  dropZone.classList.add('has-file');
  compressBtn.disabled = false;
  resultEl.hidden  = true;
  upsellEl.hidden  = true;
  newFileBtn.hidden = true;
}

function fmtBytes(n) {
  if (n < 1024)       return n + ' B';
  if (n < 1048576)    return (n / 1024).toFixed(1) + ' KB';
  if (n < 1073741824) return (n / 1048576).toFixed(1) + ' MB';
  return (n / 1073741824).toFixed(2) + ' GB';
}

function setProgress(page, total) {
  progressBar.style.width  = Math.round((page / total) * 100) + '%';
  progressText.textContent = t('progressPage', String(page), String(total));
}

function setLocked(locked) {
  isCompressing        = locked;
  compressBtn.disabled = locked;
  dropZone.style.pointerEvents = locked ? 'none' : '';
  fileInput.disabled   = locked;
}

// ── Core compression ──────────────────────────────────────────────────────────

async function compress() {
  if (!currentFile || isCompressing) return;

  setLocked(true);
  progressWrap.hidden     = false;
  resultEl.hidden         = true;
  upsellEl.hidden         = true;
  newFileBtn.hidden       = true;
  progressBar.style.width = '0%';
  progressText.textContent = t('preparing');

  try {
    const cfg   = QUALITY[selectedQuality];
    const scale = cfg.dpi / 96;

    const inputBuf = await currentFile.arrayBuffer();
    const pdfDoc   = await pdfjsLib.getDocument({ data: inputBuf }).promise;
    const numPages = pdfDoc.numPages;

    if (numPages === 0) throw new Error(t('errNoPages'));

    const outDoc = await PDFDocument.create();
    const canvas = document.createElement('canvas');
    const ctx    = canvas.getContext('2d');

    // ── Batch processing: process BATCH_SIZE pages, then yield to GC ──
    for (let batch = 0; batch < numPages; batch += BATCH_SIZE) {
      const batchEnd = Math.min(batch + BATCH_SIZE, numPages);

      for (let i = batch + 1; i <= batchEnd; i++) {
        setProgress(i, numPages);

        const page     = await pdfDoc.getPage(i);
        const viewport = page.getViewport({ scale });

        canvas.width  = viewport.width;
        canvas.height = viewport.height;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        await page.render({ canvasContext: ctx, viewport }).promise;

        const blob      = await canvasToJpegBlob(canvas, cfg.jpeg);
        const jpegBytes = new Uint8Array(await blob.arrayBuffer());

        const img     = await outDoc.embedJpg(jpegBytes);
        const outPage = outDoc.addPage([viewport.width, viewport.height]);
        outPage.drawImage(img, { x: 0, y: 0, width: viewport.width, height: viewport.height });

        // Release page resources immediately
        page.cleanup();
      }

      // Between batches: clear canvas and yield to browser for GC
      canvas.width = 1; canvas.height = 1;
      ctx.clearRect(0, 0, 1, 1);
      await new Promise(r => setTimeout(r, 0));
    }

    showResult(await outDoc.save());

  } catch (err) {
    const msg = err?.name === 'PasswordException'
      ? t('errPasswordProtected')
      : '✗ ' + err.message;
    progressText.textContent = msg;
    console.error(err);
  } finally {
    setLocked(false);
    progressWrap.hidden = true;
  }
}

function canvasToJpegBlob(canvas, quality) {
  return new Promise((resolve, reject) => {
    const timer = setTimeout(() => reject(new Error('Canvas toBlob timed out')), 30_000);
    canvas.toBlob(b => {
      clearTimeout(timer);
      b ? resolve(b) : reject(new Error('Canvas toBlob failed'));
    }, 'image/jpeg', quality);
  });
}

function showResult(compressed) {
  const before = currentFile.size;
  const after  = compressed.byteLength;
  const ratio  = (1 - after / before) * 100;

  document.getElementById('result-before').textContent = fmtBytes(before);
  document.getElementById('result-after').textContent  = fmtBytes(after);

  const ratioEl     = document.getElementById('result-ratio');
  ratioEl.textContent = (ratio >= 0 ? '-' : '+') + Math.abs(ratio).toFixed(1) + '%';
  ratioEl.className   = 'stat-value ratio ' + (ratio >= 0 ? 'good' : 'bad');

  if (lastBlobUrl) URL.revokeObjectURL(lastBlobUrl);
  const compressedBlob = new Blob([compressed], { type: 'application/pdf' });
  lastBlobUrl = URL.createObjectURL(compressedBlob);
  const outName = currentFile.name.replace(/\.pdf$/i, '') + '_kompakt.pdf';

  // Save button
  document.getElementById('save-btn').onclick = () => {
    const a = document.createElement('a');
    a.href = lastBlobUrl; a.download = outName; a.click();
  };

  // Share button — show only if Web Share API is available (mobile)
  const shareBtn = document.getElementById('share-btn');
  if (navigator.canShare) {
    const file = new File([compressedBlob], outName, { type: 'application/pdf' });
    if (navigator.canShare({ files: [file] })) {
      shareBtn.hidden = false;
      shareBtn.onclick = () => {
        navigator.share({ files: [file], title: outName }).catch(() => {});
      };
    }
  }

  resultEl.hidden = false;

  // Show donate
  document.getElementById('donate-block').hidden = false;

  const ratioStr = Math.max(0, ratio).toFixed(0);
  document.getElementById('upsell-body').innerHTML = t('upsellBody', ratioStr);
  document.getElementById('upsell-link').textContent = t('upsellLink');
  upsellEl.hidden = false;

  newFileBtn.hidden = false;
}

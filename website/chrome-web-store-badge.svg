<svg xmlns="http://www.w3.org/2000/svg" width="248" height="68" viewBox="0 0 248 68" role="img" aria-label="Available in the Chrome Web Store">
  <!-- card -->
  <rect x="1" y="1" width="246" height="66" rx="8" fill="#ffffff" stroke="#dadce0" stroke-width="1.5"/>

  <!--
    Chrome logo — center (34, 34), outer R=18, inner r=9
    3 arcs × 120°, clockwise from top (12 o'clock = 270° in standard math)
    Segment endpoints on outer ring (from top clockwise):
      A = (34, 16)         0°
      B = (49.59, 43)    120°
      C = (18.41, 43)    240°
    On inner ring (r=9):
      a = (34, 25)
      b = (41.79, 38.5)
      c = (26.21, 38.5)
  -->

  <!-- Red  A→B outer, B→b inner reversed -->
  <path d="M34,16 A18,18 0 0,1 49.59,43 L41.79,38.5 A9,9 0 0,0 34,25 Z" fill="#EA4335"/>
  <!-- Green  B→C outer -->
  <path d="M49.59,43 A18,18 0 0,1 18.41,43 L26.21,38.5 A9,9 0 0,0 41.79,38.5 Z" fill="#34A853"/>
  <!-- Yellow  C→A outer -->
  <path d="M18.41,43 A18,18 0 0,1 34,16 L34,25 A9,9 0 0,0 26.21,38.5 Z" fill="#FBBC05"/>

  <!-- white separator ring (covers seams) -->
  <circle cx="34" cy="34" r="9.6" fill="none" stroke="#ffffff" stroke-width="1.2"/>

  <!-- blue centre -->
  <circle cx="34" cy="34" r="8.5" fill="#4285F4"/>
  <!-- white highlight -->
  <circle cx="34" cy="34" r="5.5" fill="#ffffff" opacity="0.15"/>

  <!-- text -->
  <text x="64" y="28"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif"
        font-size="11.5" fill="#5f6368" letter-spacing="0.15">Available in the</text>
  <text x="64" y="48"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif"
        font-size="16" font-weight="600" fill="#202124" letter-spacing="-0.3">Chrome Web Store</text>
</svg>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>pdf-kompakt</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <header class="header">
    <div class="logo">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <rect x="2" y="1" width="10" height="13" rx="1.5" fill="#21262d" stroke="#39d0d8" stroke-width="1.2"/>
        <path d="M9 1.5V5h3.5" stroke="#39d0d8" stroke-width="1" stroke-linecap="round"/>
        <line x1="4.5" y1="7.5" x2="9.5" y2="7.5" stroke="#39d0d8" stroke-width="1" stroke-linecap="round"/>
        <line x1="4.5" y1="9.5" x2="9.5" y2="9.5" stroke="#39d0d8" stroke-width="1" stroke-linecap="round"/>
        <line x1="4.5" y1="11.5" x2="7.5" y2="11.5" stroke="#39d0d8" stroke-width="1" stroke-linecap="round"/>
      </svg>
      <span>pdf-kompakt</span>
    </div>
    <span class="badge" data-i18n="badge">browser</span>
  </header>

  <!-- Drop zone -->
  <div class="drop-zone" id="drop-zone">
    <svg class="drop-svg" width="36" height="36" viewBox="0 0 36 36" fill="none">
      <rect x="5" y="2" width="22" height="29" rx="3" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
      <path d="M21 2.5V10H28.5" stroke="#30363d" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M18 20v-8M18 20l-3-3M18 20l3-3" stroke="#39d0d8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="11" y1="24" x2="25" y2="24" stroke="#30363d" stroke-width="1.2" stroke-linecap="round"/>
    </svg>
    <div class="drop-label" data-i18n="dropTitle">Drop PDF here</div>
    <div class="drop-hint" data-i18n="dropHint">or click to browse · up to ~50 MB</div>
    <input type="file" id="file-input" accept=".pdf,application/pdf" hidden>
  </div>

  <!-- Quality selector -->
  <div class="section-label" data-i18n="labelCompression">compression</div>
  <div class="quality-row">
    <button class="quality-btn" data-quality="low">
      <span class="q-key" data-i18n="qualityLow">low</span>
      <span class="q-desc" data-i18n="qualityLowDesc">72 dpi · max</span>
    </button>
    <button class="quality-btn active" data-quality="medium">
      <span class="q-key" data-i18n="qualityMedium">medium</span>
      <span class="q-desc" data-i18n="qualityMediumDesc">150 dpi · ★</span>
    </button>
    <button class="quality-btn" data-quality="high">
      <span class="q-key" data-i18n="qualityHigh">high</span>
      <span class="q-desc" data-i18n="qualityHighDesc">300 dpi</span>
    </button>
  </div>

  <!-- Compress button -->
  <button class="compress-btn" id="compress-btn" disabled data-i18n="btnCompress">
    Compress PDF
  </button>

  <!-- Progress -->
  <div class="progress-wrap" id="progress" hidden>
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progress-bar"></div>
    </div>
    <div class="progress-text" id="progress-text"></div>
  </div>

  <!-- Result -->
  <div class="result" id="result" hidden>
    <div class="result-stats">
      <div class="stat">
        <span class="stat-label" data-i18n="statBefore">before</span>
        <span class="stat-value" id="result-before">—</span>
      </div>
      <div class="stat-arrow">→</div>
      <div class="stat">
        <span class="stat-label" data-i18n="statAfter">after</span>
        <span class="stat-value" id="result-after">—</span>
      </div>
      <div class="stat stat-ratio">
        <span class="stat-label" data-i18n="statSaved">saved</span>
        <span class="stat-value ratio" id="result-ratio">—</span>
      </div>
    </div>
    <button class="download-btn" id="download-btn" data-i18n="btnDownload">
      Download compressed PDF
    </button>
  </div>

  <!-- Upsell -->
  <div class="upsell" id="upsell" hidden>
    <div class="upsell-row">
      <span class="upsell-spark">⚡</span>
      <div class="upsell-text" id="upsell-body"></div>
    </div>
    <a class="upsell-link" id="upsell-link" href="https://github.com/xronocode/kompakt/releases/latest" target="_blank" data-i18n="upsellLink">
      Download free desktop app →
    </a>
  </div>

  <!-- Donate -->
  <div class="donate-row">
    <a class="donate-link" href="https://ko-fi.com/xronocode" target="_blank" data-i18n="donateLink">
      ☕ Support pdf-kompakt on Ko-fi
    </a>
  </div>

</div>

<script src="popup.js"></script>
</body>
</html>

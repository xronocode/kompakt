<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  width: 440px; height: 280px; overflow: hidden;
  background: #070b10;
  font-family: 'SF Mono', ui-monospace, 'Cascadia Mono', Consolas, monospace;
  position: relative;
}

/* ambient glow */
body::before {
  content: '';
  position: absolute;
  width: 320px; height: 320px;
  background: radial-gradient(circle, rgba(57,208,216,0.13) 0%, transparent 65%);
  top: 50%; left: 50%; transform: translate(-50%, -50%);
  pointer-events: none;
}

/* grid lines */
body::after {
  content: '';
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(57,208,216,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(57,208,216,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
}

/* left panel */
.left {
  position: absolute;
  left: 24px; top: 50%; transform: translateY(-50%);
  display: flex; flex-direction: column; gap: 10px;
  z-index: 2; max-width: 210px;
}

.logo-row {
  display: flex; align-items: center; gap: 9px;
}
.logo-icon {
  width: 32px; height: 32px;
}
.logo-text {
  font-size: 18px; font-weight: 800; color: #39d0d8;
  letter-spacing: -0.5px;
}

.tagline {
  font-size: 22px; font-weight: 800; color: #e6edf3;
  line-height: 1.25; max-width: 200px;
}
.tagline span { color: #39d0d8; }

.pills {
  display: flex; flex-direction: column; gap: 5px;
  margin-top: 2px;
}
.pill {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; color: #7d8590;
}
.pill-dot {
  width: 5px; height: 5px; border-radius: 50%; background: #39d0d8; flex-shrink: 0;
}

/* right — popup mockup */
.popup-wrap {
  position: absolute;
  right: 16px; top: 50%; transform: translateY(-50%);
  z-index: 2;
}
.popup {
  width: 185px;
  background: #0d1117;
  border: 1px solid #30363d;
  border-radius: 10px;
  box-shadow: 0 20px 60px rgba(0,0,0,.8), 0 0 0 1px rgba(255,255,255,.04);
  overflow: hidden;
}
.p-bar {
  background: #0d1117; border-bottom: 1px solid #21262d;
  padding: 7px 10px; display: flex; align-items: center; gap: 5px;
}
.dots { display: flex; gap: 4px; }
.dot { width: 7px; height: 7px; border-radius: 50%; }
.dot-r { background: #ff5f57; } .dot-y { background: #ffbd2e; } .dot-g { background: #28c840; }
.url { flex:1; background:#161b22; border:1px solid #30363d; border-radius:4px; padding:2px 6px; font-size:8px; color:#7d8590; text-align:center; }
.p-body { padding: 9px; display: flex; flex-direction: column; gap: 7px; }
.p-head { display:flex; align-items:center; justify-content:space-between; }
.p-name { font-size:9px; font-weight:700; color:#39d0d8; display:flex; align-items:center; gap:4px; }
.p-badge { font-size:7px; background:#21262d; border:1px solid #30363d; color:#7d8590; padding:1px 5px; border-radius:10px; }
.p-drop { border:1px solid #39d0d8; background:rgba(57,208,216,.08); border-radius:5px; padding:10px 6px; text-align:center; }
.p-drop-icon { font-size:16px; margin-bottom:2px; }
.p-drop-t { font-size:8px; font-weight:600; color:#39d0d8; }
.p-drop-h { font-size:7px; color:#7d8590; margin-top:1px; }
.p-qual { display:flex; gap:3px; }
.p-q { flex:1; background:#161b22; border:1px solid #30363d; border-radius:4px; padding:5px 2px; text-align:center; font-size:7px; color:#7d8590; }
.p-q.active { border-color:#39d0d8; background:rgba(57,208,216,.1); color:#39d0d8; }
.p-q-key { font-weight:700; }
.p-q-desc { font-size:6px; opacity:.75; margin-top:1px; }
.p-btn { background:#39d0d8; color:#000; border-radius:4px; padding:6px; font-size:8px; font-weight:700; text-align:center; }

/* stat bar at bottom */
.stat-bar {
  position: absolute;
  bottom: 18px; left: 36px; right: 36px;
  display: flex; gap: 20px;
  z-index: 2;
}
.stat { display:flex; flex-direction:column; gap:1px; }
.stat-num { font-size:18px; font-weight:800; color:#3fb950; }
.stat-label { font-size:9px; color:#7d8590; }
</style>
</head>
<body>

<div class="left">
  <div class="logo-row">
    <svg class="logo-icon" viewBox="0 0 32 32" fill="none">
      <rect x="4" y="2" width="20" height="26" rx="3" fill="#161b22" stroke="#39d0d8" stroke-width="1.5"/>
      <path d="M18 2.5V9h6.5" stroke="#39d0d8" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="8" y1="14" x2="20" y2="14" stroke="#39d0d8" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="8" y1="18" x2="20" y2="18" stroke="#39d0d8" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="8" y1="22" x2="15" y2="22" stroke="#39d0d8" stroke-width="1.2" stroke-linecap="round"/>
    </svg>
    <span class="logo-text">pdf-kompakt</span>
  </div>

  <div class="tagline">Compress PDFs<br>in your <span>browser</span></div>

  <div class="pills">
    <div class="pill"><div class="pill-dot"></div>Files never leave your device</div>
    <div class="pill"><div class="pill-dot"></div>Drag, drop, download</div>
    <div class="pill"><div class="pill-dot"></div>8 languages · works offline</div>
  </div>
</div>

<div class="popup-wrap">
  <div class="popup">
    <div class="p-bar">
      <div class="dots"><div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div></div>
      <div class="url">chrome-extension://pdf-kompakt</div>
    </div>
    <div class="p-body">
      <div class="p-head">
        <div class="p-name">
          <svg width="10" height="10" viewBox="0 0 16 16" fill="none">
            <rect x="2" y="1" width="10" height="13" rx="1.5" fill="#21262d" stroke="#39d0d8" stroke-width="1.2"/>
            <path d="M9 1.5V5h3.5" stroke="#39d0d8" stroke-width="1" stroke-linecap="round"/>
          </svg>
          pdf-kompakt
        </div>
        <span class="p-badge">browser</span>
      </div>
      <div class="p-drop">
        <div class="p-drop-icon">📄</div>
        <div class="p-drop-t">Drop PDF here</div>
        <div class="p-drop-h">or click to browse · up to ~50 MB</div>
      </div>
      <div style="font-size:7px;color:#7d8590;text-transform:uppercase;letter-spacing:.6px;">compression</div>
      <div class="p-qual">
        <div class="p-q"><div class="p-q-key">low</div><div class="p-q-desc">72 dpi</div></div>
        <div class="p-q active"><div class="p-q-key">medium</div><div class="p-q-desc">150 dpi ★</div></div>
        <div class="p-q"><div class="p-q-key">high</div><div class="p-q-desc">300 dpi</div></div>
      </div>
      <div class="p-btn">⬇ Compress PDF</div>
    </div>
  </div>
</div>

</body>
</html>

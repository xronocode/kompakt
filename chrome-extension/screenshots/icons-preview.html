<!DOCTYPE html>
<html>
<head><meta charset="UTF-8">
<style>
body { background: #0d1117; display: flex; align-items: center; justify-content: center; height: 100vh; gap: 40px; margin: 0; }
.wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; }
img { image-rendering: pixelated; }
span { color: #7d8590; font-family: monospace; font-size: 12px; }
.bg { background: #21262d; padding: 20px; border-radius: 12px; }
</style>
</head>
<body>
<div class="wrap"><div class="bg"><img src="../src/icons/icon16.png" width="16" height="16"></div><span>16×16</span></div>
<div class="wrap"><div class="bg"><img src="../src/icons/icon48.png" width="48" height="48"></div><span>48×48</span></div>
<div class="wrap"><div class="bg"><img src="../src/icons/icon128.png" width="128" height="128"></div><span>128×128</span></div>
<div class="wrap"><div class="bg"><img src="../src/icons/icon128.png" width="64" height="64"></div><span>128 @ 2×</span></div>
</body>
</html>
